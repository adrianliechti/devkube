apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - image: grafana/grafana-oss:11.1.0
        name: grafana
        volumeMounts:
        - name: config
          mountPath: /etc/grafana/grafana.ini
          subPath: grafana.ini
        - name: config
          mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
          subPath: datasources.yaml
        - name: data
          mountPath: /var/lib/grafana
        resources: {}
      volumes:
      - name: config
        configMap:
          name: grafana
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000
  selector:
    app: grafana
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
data:
  grafana.ini: |
    [server]
    domain = grafana.platform
    root_url = http://grafana.platform

    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

    [log]
    mode = console

    [users]
    auto_assign_org = true
    auto_assign_org_role = Viewer
    allow_sign_up = false
    allow_org_create = false
    editors_can_admin = true
    viewers_can_edit = true

    [auth]
    disable_login_form = true
    disable_signout_menu = true

    [auth.basic]
    enabled = true

    [auth.proxy]
    enabled = false
    auto_sign_up = true
    header_name = X-WEBAUTH-USER
    headers = Name:X-WEBAUTH-NAME Role:X-WEBAUTH-ROLE Email:X-WEBAUTH-EMAIL Groups:X-WEBAUTH-GROUPS

    [auth.anonymous]
    enabled = true
    org_role = Viewer
    org_name = Main Org.

    [analytics]
    reporting_enabled = false
    check_for_updates = false
    check_for_plugin_updates = false
    feedback_links_enabled = false

  datasources.yaml: |
     apiVersion: 1
     datasources:
       - name: Loki
         type: loki
         uid: loki
         url: http://loki:3100
         access: proxy

       - name: Tempo
         type: tempo
         uid: tempo
         url: http://tempo:3100
         access: proxy
         jsonData:
           httpMethod: GET
           lokiSearch:
             datasourceUid: loki
           nodeGraph:
             enabled: true
           serviceMap:
             datasourceUid: prometheus
           tracesToLogs:
             datasourceUid: loki
             mapTagNamesEnabled: true
           tracesToMetrics:
             datasourceUid: prometheus

       - name: Prometheus
         type: prometheus
         uid: prometheus
         url: http://prometheus:9090
         access: proxy
         jsonData:
           httpMethod: GET

       - name: Alertmanager
         type: alertmanager
         uid: alertmanager
         url: http://alertmanager:9093
         access: proxy
         jsonData:
           implementation: prometheus